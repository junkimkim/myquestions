<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- background -->
  <rect width="64" height="64" rx="14" fill="#0A0C10"/>
  <!-- document body -->
  <rect x="14" y="10" width="28" height="36" rx="4" fill="#1C2030"/>
  <rect x="14" y="10" width="28" height="36" rx="4" fill="none" stroke="#E8C87D" stroke-width="1.5"/>
  <!-- lines on document -->
  <line x1="20" y1="20" x2="36" y2="20" stroke="#E8C87D" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="20" y1="26" x2="36" y2="26" stroke="#E8C87D" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="20" y1="32" x2="30" y2="32" stroke="#E8C87D" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- pencil -->
  <g transform="translate(34, 34) rotate(-45)">
    <rect x="-4" y="-12" width="8" height="18" rx="2" fill="#E8C87D"/>
    <polygon points="-4,6 4,6 0,12" fill="#F5E3A3"/>
    <rect x="-4" y="-14" width="8" height="4" rx="1" fill="#9CA3AF"/>
  </g>
</svg>
